<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD FAHIM - Developer Portfolio</title>
    <style>
        body {
            background: #121212;
            color: #fff;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 60px 20px;
            margin: 0;
        }
        .profile-card {
            background: #1e1e1e;
            max-width: 450px;
            margin: 0 auto;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
        }
        .profile-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.2rem;
            margin: 10px 0 5px 0;
        }
        .tagline {
            color: #aaaaaa;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .info-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            text-align: left;
        }
        .info-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 1.05rem;
        }
        .info-table td.label {
            color: #00ffcc;
            font-weight: bold;
            width: 40%;
        }
        .footer-text {
            color: #666;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- ছবির বদলে একটি সুন্দর কোডিং ইমোজি আইকন -->
        <div class="profile-icon">👨‍💻</div>
        
        <h1>MD FAHIM</h1>
        <p class="tagline">Junior Developer</p>
        
        <table class="info-table">
            <tr>
                <td class="label">Age:</td>
                <td>14 Years</td>
            </tr>
            <tr>
                <td class="label">Profession:</td>
                <td>Student & Developer</td>
            </tr>
            <tr>
                <td class="label">Skills:</td>
                <td>HTML, Java, Python</td>
            </tr>
            <tr>
                <td class="label">Career Goal:</td>
                <td>Software Engineer</td>
            </tr>
        </table>
    </div>

    <p class="footer-text">Developer Portfolio &bull; Hosted via GitHub</p>

</body>
</html>
